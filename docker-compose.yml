version: '3.8'

services:
  # Ollama AI Service
  ollama:
    image: ollama/ollama:latest
    container_name: vinh-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    restart: unless-stopped
    networks:
      - vinh-network

  # Python AI Microservice (Translation, TTS, STT, Text Preprocessing)
  python-api:
    build:
      context: ./Backend/PythonAPI
      dockerfile: Dockerfile
    container_name: vinh-python-api
    ports:
      - "5000:5000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2
      - WHISPER_MODEL=base
      - PYTHON_API_HOST=0.0.0.0
      - PYTHON_API_PORT=5000
      - FLASK_ENV=production
    depends_on:
      - ollama
    volumes:
      - piper_cache:/root/.cache
      - whisper_cache:/root/.cache/whisper
    restart: unless-stopped
    networks:
      - vinh-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # .NET Backend API
  dotnet-api:
    build:
      context: ./Backend/WebApi.PoC
      dockerfile: Dockerfile
    container_name: vinh-dotnet-api
    ports:
      - "7047:7047"
    environment:
      - ASPNETCORE_URLS=https://0.0.0.0:7047
      - PythonAPI__BaseUrl=http://python-api:5000
      - CloudinarySettings__CloudName=${CLOUDINARY_CLOUD_NAME}
      - CloudinarySettings__ApiKey=${CLOUDINARY_API_KEY}
      - CloudinarySettings__ApiSecret=${CLOUDINARY_API_SECRET}
    depends_on:
      - python-api
    restart: unless-stopped
    networks:
      - vinh-network

networks:
  vinh-network:
    driver: bridge

volumes:
  ollama_data:
    driver: local
  piper_cache:
    driver: local
  whisper_cache:
    driver: local
